name: libraryos
description: "Library management app for Indian library owners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  supabase_flutter: ^2.8.1
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  fl_chart: ^0.70.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  razorpay_flutter: ^1.3.7
  collection: ^1.18.0
  table_calendar: ^3.1.2
  timeago: ^3.7.0
  file_picker: ^8.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#1A237E"
  image: "assets/splash/splash.png"
  android_12:
    color: "#1A237E"
    image: "assets/splash/splash.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/